{% load static %}

<link rel="stylesheet" href="{% static 'partials/css/side-nav.css' %}?v=1">

<aside
    class="profile-side-navbar"
    id="profile-side-navbar"
    data-side-nav
    data-active="{{ side_nav_active|default:'' }}"
    data-cart-api="/cart/api/carts/"
    data-wallet-api="/payment/api/wallet/"
    data-premium-api="/payment/api/premium/"
    aria-label="منوی حساب کاربری"
>

    <a href="/ketabook/" class="profile-side-logo" aria-label="کتابوک">
        ک
    </a>

    <nav class="profile-side-menu">

        <a
            href="/account/profile/"
            class="profile-side-link {% if side_nav_active == 'profile' %}active{% endif %}"
            aria-label="پروفایل"
        >
            <span class="profile-side-icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 21a8 8 0 0 1 16 0"></path>
                </svg>
            </span>

            <span class="profile-side-content">
                <strong>پروفایل</strong>
                <small>حساب کاربری شما</small>
            </span>
        </a>


        <a
            href="/cart/"
            class="profile-side-link {% if side_nav_active == 'cart' %}active{% endif %}"
            aria-label="سبد خرید"
        >
            <span class="profile-side-icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="9" cy="20" r="1.5"></circle>
                    <circle cx="18" cy="20" r="1.5"></circle>
                    <path d="M3 4h2l3 12h10l3-8H7"></path>
                </svg>
            </span>

            <span class="profile-side-content">
                <strong>سبد خرید</strong>
                <small>
                    <span id="profile-side-cart-count">۰</span>
                    آیتم
                </small>
            </span>
        </a>


        <a
            href="/payment/wallet/"
            class="profile-side-link {% if side_nav_active == 'wallet' %}active{% endif %}"
            aria-label="موجودی کیف پول"
        >
            <span class="profile-side-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12H5a2 2 0 0 1-2-2z"></path>
                    <path d="M17 12h4v4h-4a2 2 0 0 1 0-4z"></path>
                </svg>
            </span>

            <span class="profile-side-content">
                <strong>موجودی کیف پول</strong>
                <small id="profile-side-wallet-amount">در حال دریافت...</small>
            </span>
        </a>


        <a
            href="/payment/premium/"
            class="profile-side-link {% if side_nav_active == 'premium' %}active{% endif %}"
            aria-label="اشتراک ویژه"
        >
            <span class="profile-side-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 18.8 5.8 22 7 15.2l-5-4.9 6.9-1L12 3z"></path>
                </svg>
            </span>

            <span class="profile-side-content">
                <strong>اشتراک ویژه</strong>
                <small id="profile-side-premium-status">در حال دریافت...</small>
            </span>
        </a>


        <a
            href="/account/factors/"
            class="profile-side-link {% if side_nav_active == 'factors' %}active{% endif %}"
            aria-label="فاکتورها"
        >
            <span class="profile-side-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M7 3h10a2 2 0 0 1 2 2v16l-3-2-2 2-2-2-2 2-2-2-3 2V5a2 2 0 0 1 2-2z"></path>
                    <path d="M9 8h6"></path>
                    <path d="M9 12h6"></path>
                    <path d="M9 16h4"></path>
                </svg>
            </span>

            <span class="profile-side-content">
                <strong>فاکتورها</strong>
                <small>خریدها، شارژها و اشتراک‌ها</small>
            </span>
        </a>


        <a
            href="/account/reviews/"
            class="profile-side-link {% if side_nav_active == 'reviews' %}active{% endif %}"
            aria-label="نظرهای من"
        >
            <span class="profile-side-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
                    <path d="M8 9h8"></path>
                    <path d="M8 13h5"></path>
                </svg>
            </span>

            <span class="profile-side-content">
                <strong>نظرهای من</strong>
                <small>دیدگاه‌های ثبت‌شده</small>
            </span>
        </a>


        <a
            href="/account/downloads/"
            class="profile-side-link {% if side_nav_active == 'downloads' %}active{% endif %}"
            aria-label="دانلود و ذخیره"
        >
            <span class="profile-side-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3v11"></path>
                    <path d="M8 10l4 4 4-4"></path>
                    <path d="M5 20h14"></path>
                    <path d="M6 17v3"></path>
                    <path d="M18 17v3"></path>
                </svg>
            </span>

            <span class="profile-side-content">
                <strong>کتاب های من</strong>
                <small>کتاب‌های آنلاین خریداری‌شده</small>
            </span>
        </a>

    </nav>

</aside>

<script src="{% static 'partials/js/side-nav.js' %}?v=1" defer></script>
